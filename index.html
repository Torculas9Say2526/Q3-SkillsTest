<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <link rel="stylesheet" href="styles.css">
</head>
<body>
    
    <div class="container mt-4 p-4 text-center">
        <h1>Members Sign-Up</h1><br>
            <h2>Student Details</h2><br>

        <label for="fullname">FullName:</label><br>
        <input type="text" id="fullname" name="fullname" class="form-control"><br>

        <h2>Ticket Selection</h2>
            <label for="ticket">Quantity: (₱250.00 each)</label>
            <input type="text" id="ticket" name="ticket" class="form-control">
            <br>

        <h2>Payment Details:</h2><br>
          <label for="subtotal">Subtotal:</label>
            <input type="text" id="subtotal" name="subtotal" class="form-control"><br>
            
            <label for="adminfee">Admin Fee:</label>
            <input type="number" id="ticket-quantity" name="ticket-quantity" class="form-control" placeholder="Enter quantity...">
            <br>

            <label for="total">Total: </label>
            <input type="text" id="total" name="total" class="form-control">
            <br>

                <button type="button" onclick="verbNoun()">Register</button>
                <button type="button" onclick="window.location.reload()">Refresh</button>

    </div>
</body>
</html>
